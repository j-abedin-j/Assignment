{% extends 'tasks/base.html' %}

{% block content %}
<h2>{% if form.instance.pk %}Update Task  {% else %} New Task{% endif %}</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'task_list' %}">Cancel</a>
</form>
{% endblock %}
